name: Update API Reference

on:
  push:
    paths:
      - 'oas/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate API reference
        run: node scripts/generate-api-reference.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet skills/api/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated reference
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/api/
          git commit -m "docs: auto-update API reference from OpenAPI spec changes"
          git push

      - name: Check for stale references
        if: steps.changes.outputs.changed == 'true'
        id: stale
        continue-on-error: true
        run: node scripts/check-stale-references.js 2>&1 | tee /tmp/stale-output.txt

      - name: Create issue for stale references
        if: steps.stale.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/stale-output.txt', 'utf-8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'API spec change detected — review curated skills',
              body: `The OpenAPI specs were updated and the API reference has been regenerated.\n\nThe stale reference checker found potential issues:\n\n\`\`\`\n${output}\n\`\`\`\n\nReview the listed skills and update any stale API references.\n\n---\n*Auto-created by the API reference pipeline.*`,
              labels: ['api-reference', 'maintenance'],
            });
